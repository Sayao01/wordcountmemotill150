<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>140文字メモ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    html { touch-action: manipulation; }

    body {
      margin: 0;
      padding: 24px;
      font-family: 'DotGothic16', sans-serif;
      color: #30406f;
      background:
        radial-gradient(circle at 20% 20%, #fff 0 2px, transparent 3px),
        linear-gradient(180deg, #dff8ff 0%, #e7e7ff 48%, #ffe3fb 100%);
      background-size: 22px 22px, 100% 100%;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body.night {
      color: #eef3ff;
      background:
        radial-gradient(circle at 20% 20%, #fff 0 2px, transparent 3px),
        linear-gradient(180deg, #10132d 0%, #29205c 55%, #6d3d7d 100%);
      background-size: 22px 22px, 100% 100%;
    }

    .page {
      max-width: 880px;
      margin: 0 auto;
      border: 2px solid #fff;
      border-radius: 24px;
      padding: 18px;
      background: rgba(255,255,255,.45);
      box-shadow: 0 0 20px #fff, 0 0 35px #b9d7ff;
    }

    body.night .page {
      background: rgba(20, 22, 60, .55);
      box-shadow: 0 0 20px #fff, 0 0 35px #9b8cff;
    }

    header {
      text-align: center;
      padding: 18px 10px;
      border-radius: 20px;
      background: linear-gradient(180deg, #fff, #d9efff 45%, #f6dcff);
      border: 2px solid #fff;
      box-shadow: inset 0 0 12px #fff, 0 4px 15px rgba(130,150,255,.25);
      margin-bottom: 16px;
    }

    body.night header {
      background: linear-gradient(180deg, #343770, #26274f 45%, #4b2d73);
    }

    h1 {
      margin: 0;
      font-size: 34px;
      color: #7777ff;
      text-shadow: 2px 2px #fff, 0 0 8px #ffbdf4;
      letter-spacing: 2px;
    }

    body.night h1 {
      color: #cfd1ff;
      text-shadow: 0 0 8px #fff, 0 0 14px #b7a8ff;
    }

    .subtitle {
      margin-top: 8px;
      color: #6b6bb5;
      font-size: 15px;
    }

    body.night .subtitle { color: #eef3ff; }

    .notice {
      text-align: center;
      margin: 12px 0 18px;
      padding: 9px;
      border-radius: 999px;
      background: #10132d;
      color: #8cffc1;
      box-shadow: inset 0 0 8px #5fffff, 0 0 10px #fff;
      font-size: 16px;
    }

    .menu {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    button,
    .menu button,
    .editor {
      touch-action: manipulation;
    }

    .menu button {
      width: auto;
      padding: 6px 12px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffffff, #cce8ff);
      border: 1px solid #ffffff;
      box-shadow: 0 3px 8px rgba(90,100,180,.22);
      color: #5d65c9;
    }

    .block {
      margin-bottom: 16px;
      padding: 14px;
      border-radius: 18px;
      border: 2px solid #fff;
      background: linear-gradient(180deg, rgba(255,255,255,.9), rgba(231,244,255,.78));
      box-shadow: 0 0 12px #fff, 0 5px 14px rgba(120,140,220,.22);
    }

    .block:nth-child(2n) {
      background: linear-gradient(180deg, rgba(255,255,255,.9), rgba(255,232,250,.78));
    }

    .block:nth-child(3n) {
      background: linear-gradient(180deg, rgba(255,255,255,.9), rgba(226,255,236,.78));
    }

    body.night .block {
      background: linear-gradient(180deg, rgba(43,45,96,.9), rgba(30,34,78,.78));
      color: #eef3ff;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      color: #6168d9;
      font-weight: bold;
    }

    body.night .topline { color: #d7d9ff; }

    .counter { color: #6d5fff; }

    body.night .counter { color: #c7fff3; }

    .counter.over {
      color: #ff2f7d;
      text-shadow: 0 0 4px #fff;
    }

    .editor {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      border-radius: 12px;
      border: 2px inset #c7d5ff;
      background: rgba(255,255,255,.92);
      color: #28345f;
      outline: none;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 16px;
      line-height: 1.7;
      box-shadow: inset 0 0 8px rgba(160,180,255,.35);
      resize: vertical;
      font-family: 'DotGothic16', sans-serif;
    }

    body.night .editor {
      background: rgba(255,255,255,.9);
      color: #20264f;
    }

    .editor:focus {
      border-color: #ff9ee7;
      box-shadow: inset 0 0 8px #ffd8f5, 0 0 8px #fff;
    }

    .buttons {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      font-family: 'DotGothic16', sans-serif;
      border: 1px solid #fff;
      border-radius: 999px;
      padding: 8px 16px;
      color: #4a54b5;
      background: linear-gradient(180deg, #fff, #c7e4ff);
      box-shadow: inset 0 2px 2px #fff, 0 4px 10px rgba(100,120,200,.25);
      cursor: pointer;
      font-size: 16px;
    }

    button:active { transform: translateY(1px); }

    .clear {
      background: linear-gradient(180deg, #fff, #ffd7f2);
      color: #ba4faa;
    }

    .main-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 20px 0 8px;
    }

    .add, .save-all {
      min-width: 240px;
      font-weight: bold;
    }

    .add {
      background: linear-gradient(180deg, #fff, #dcd4ff);
      color: #6860d9;
    }

    .save-all {
      background: linear-gradient(180deg, #fff, #c9fff0);
      color: #009d83;
    }

    .copied {
      color: #00a66a;
      font-size: 14px;
    }

    footer {
      text-align: center;
      margin-top: 18px;
      padding-top: 12px;
      border-top: 2px dotted #9fb7ff;
      color: #6a70b8;
      font-size: 13px;
    }

    body.night footer { color: #eef3ff; }

    .star, .heart, .rain, .bunny {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
    }

    .star {
      font-size: 24px;
      animation: shooting 1.2s linear forwards;
    }

    @keyframes shooting {
      from { transform: translate(0, 0) scale(1); opacity: 1; }
      to { transform: translate(-520px, 520px) scale(.5); opacity: 0; }
    }

    .heart {
      font-size: 22px;
      animation: falling 2s linear forwards;
    }

    .rain {
      font-size: 18px;
      animation: falling 1.5s linear forwards;
      color: #ffffff;
      text-shadow: 0 0 8px #9be8ff;
    }

    @keyframes falling {
      from { transform: translateY(-20px); opacity: 1; }
      to { transform: translateY(100vh); opacity: 0; }
    }

    .bunny {
      bottom: 20px;
      left: -60px;
      font-size: 34px;
      animation: walkBunny 5s linear forwards;
    }

    @keyframes walkBunny {
      from { transform: translateX(0); }
      to { transform: translateX(calc(100vw + 100px)); }
    }

    @media (max-width: 600px) {
      body { padding: 12px; }
      h1 { font-size: 27px; }
      .page { padding: 12px; }
      button { width: 100%; }
      .menu button { width: auto; }

      .topline {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <h1>✦ 140 MEMO ✦</h1>
      <div class="subtitle">140文字まで入力できるメモ帳です♡</div>
    </header>

    <div class="notice">
      ☆今日はどんな気分？☆
    </div>

    <div class="menu">
      <button onclick="shootStar()">⭐</button>
      <button onclick="fallHearts()">💖</button>
      <button onclick="fallRain()">🌧</button>
      <button onclick="nightMode()">🌙</button>
      <button onclick="summonBunny()">🐰</button>
    </div>

    <div id="blocks"></div>

    <div class="main-actions">
      <button class="save-all" onclick="saveAllBlocks()">✧ 全部一括コピー ✧</button>
      <button class="add" onclick="addBlock()">✧ 新しいブロックを追加する ✧</button>
    </div>

    <footer>
      ☆ 140文字メモ ☆<br>
      Copyright (C) Syao!1
    </footer>
  </div>

  <script>
    const LIMIT = 140;
    const blocks = document.getElementById("blocks");
    let blockCount = 0;

    function addBlock(text = "") {
      blockCount++;

      const block = document.createElement("div");
      block.className = "block";

      const topline = document.createElement("div");
      topline.className = "topline";

      const title = document.createElement("div");
      title.textContent = `✧ ブロック${blockCount}`;

      const counter = document.createElement("div");
      counter.className = "counter";
      counter.textContent = `0 / ${LIMIT}文字`;

      topline.appendChild(title);
      topline.appendChild(counter);

      const editor = document.createElement("textarea");
      editor.className = "editor";
      editor.value = text;
      editor.rows = 5;
      editor.spellcheck = false;

      const buttons = document.createElement("div");
      buttons.className = "buttons";

      const copyBtn = document.createElement("button");
      copyBtn.textContent = "このブロックをコピー";

      const clearBtn = document.createElement("button");
      clearBtn.className = "clear";
      clearBtn.textContent = "クリア";

      const copied = document.createElement("span");
      copied.className = "copied";

      buttons.appendChild(copyBtn);
      buttons.appendChild(clearBtn);
      buttons.appendChild(copied);

      block.appendChild(topline);
      block.appendChild(editor);
      block.appendChild(buttons);
      blocks.appendChild(block);

      updateCounter(editor, counter);

      editor.addEventListener("input", () => {
        updateCounter(editor, counter);
      });

      copyBtn.addEventListener("click", async () => {
        const plainText = editor.value.replace(/\n$/, "");
        await navigator.clipboard.writeText(plainText);
        copied.textContent = "コピーしました♡";
        setTimeout(() => copied.textContent = "", 1200);
      });

      clearBtn.addEventListener("click", () => {
        editor.value = "";
        updateCounter(editor, counter);
        editor.focus();
      });
    }

    function updateCounter(editor, counter) {
      const text = editor.value.replace(/\n$/, "");
      const count = [...text].length;

      counter.textContent = `${count} / ${LIMIT}文字`;
      counter.classList.toggle("over", count > LIMIT);
    }

    async function saveAllBlocks() {
      const editors = document.querySelectorAll(".editor");

      const texts = [...editors]
        .map(editor => editor.value.replace(/\n$/, "").trim())
        .filter(text => text.length > 0);

      if (texts.length === 0) {
        alert("コピーする文章がありません！");
        return;
      }

      const joinedText = texts.join("\nーー\n");

      await navigator.clipboard.writeText(joinedText);

      alert("全部まとめてコピーしました♡");
    }

    function shootStar() {
      const star = document.createElement("div");
      star.className = "star";
      star.textContent = "⭐";
      star.style.top = Math.random() * 220 + "px";
      star.style.left = window.innerWidth + "px";
      document.body.appendChild(star);

      setTimeout(() => star.remove(), 1200);
    }

    function fallHearts() {
      for (let i = 0; i < 20; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.textContent = "💖";
        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.top = "-30px";
        heart.style.animationDelay = Math.random() * 0.8 + "s";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 2800);
      }
    }

    function fallRain() {
      for (let i = 0; i < 30; i++) {
        const rain = document.createElement("div");
        rain.className = "rain";
        rain.textContent = "✦";
        rain.style.left = Math.random() * window.innerWidth + "px";
        rain.style.top = "-30px";
        rain.style.animationDelay = Math.random() * 0.8 + "s";
        document.body.appendChild(rain);

        setTimeout(() => rain.remove(), 2400);
      }
    }

    function nightMode() {
      document.body.classList.toggle("night");
    }

    function summonBunny() {
      const bunny = document.createElement("div");
      bunny.className = "bunny";
      bunny.textContent = "🐰";
      document.body.appendChild(bunny);

      setTimeout(() => bunny.remove(), 5000);
    }

    addBlock();
  </script>
</body>
</html>
