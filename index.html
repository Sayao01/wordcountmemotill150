<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>150文字ブロックコピー</title>
  <style>
    body {
  font-family: "MS PGothic", "Hiragino Kaku Gothic ProN", sans-serif;
  background: #00ffff;
  color: #000080;
  padding: 10px;
  background-image:
    linear-gradient(45deg, #ffccff 25%, transparent 25%),
    linear-gradient(-45deg, #ffff99 25%, transparent 25%);
  background-size: 32px 32px;
}

h1 {
  font-size: 26px;
  color: #ff00ff;
  background: #ffff00;
  border: 5px ridge #ff0000;
  padding: 8px;
  text-align: center;
  text-shadow: 2px 2px #00ff00;
}

.block {
  background: #ffffff;
  border: 4px outset #999;
  padding: 10px;
  margin-bottom: 16px;
}

.counter {
  font-size: 14px;
  color: #0000ff;
  background: #ffffcc;
  border: 2px inset #ccc;
  padding: 4px;
  margin-bottom: 6px;
}

.counter.over {
  color: #ff0000;
  font-weight: bold;
  background: #ffcccc;
}

.editor {
  width: 100%;
  min-height: 120px;
  border: 3px inset #999;
  background: #fffaf0;
  color: #000;
  padding: 8px;
  font-size: 16px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
  outline: none;
  box-sizing: border-box;
}

.over-text {
  color: #ff0000;
  background: #ffff00;
  font-weight: bold;
  text-decoration: underline;
}

button {
  font-family: "MS PGothic", sans-serif;
  margin-top: 8px;
  padding: 6px 12px;
  border: 3px outset #ccc;
  background: #c0c0c0;
  color: #000;
  font-size: 14px;
  cursor: pointer;
}

button:active {
  border: 3px inset #ccc;
}

.add {
  width: 100%;
  background: #ffccff;
  color: #000080;
  font-weight: bold;
}

.copied {
  font-size: 13px;
  color: #008000;
  margin-left: 8px;
  background: #ffff00;
}
  </style>
</head>
<body>

  <h1>150文字ブロックコピー</h1>

  <div id="blocks"></div>

  <button class="add" onclick="addBlock()">＋ ブロックを追加</button>

  <script>
    const LIMIT = 150;
    const blocks = document.getElementById("blocks");

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function addBlock(text = "") {
      const block = document.createElement("div");
      block.className = "block";

      const counter = document.createElement("div");
      counter.className = "counter";
      counter.textContent = `0 / ${LIMIT}`;

      const editor = document.createElement("div");
      editor.className = "editor";
      editor.contentEditable = "true";

      const copyBtn = document.createElement("button");
      copyBtn.textContent = "このブロックをコピー";

      const copied = document.createElement("span");
      copied.className = "copied";

      block.appendChild(counter);
      block.appendChild(editor);
      block.appendChild(copyBtn);
      block.appendChild(copied);
      blocks.appendChild(block);

      editor.innerText = text;
      updateEditor(editor, counter);

      editor.addEventListener("input", () => {
        updateEditor(editor, counter);
      });

      copyBtn.addEventListener("click", async () => {
        const plainText = editor.innerText;
        await navigator.clipboard.writeText(plainText);
        copied.textContent = "コピーしました";
        setTimeout(() => copied.textContent = "", 1200);
      });
    }

    function updateEditor(editor, counter) {
      const text = editor.innerText.replace(/\n$/, "");
      const count = [...text].length;

      counter.textContent = `${count} / ${LIMIT}`;
      counter.classList.toggle("over", count > LIMIT);

      const selection = window.getSelection();
      const range = selection.rangeCount > 0 ? selection.getRangeAt(0) : null;
      const cursorOffset = getCursorOffset(editor);

      const normal = [...text].slice(0, LIMIT).join("");
      const over = [...text].slice(LIMIT).join("");

      editor.innerHTML =
        escapeHtml(normal) +
        (over ? `<span class="over-text">${escapeHtml(over)}</span>` : "");

      setCursorOffset(editor, cursorOffset);
    }

    function getCursorOffset(element) {
      const selection = window.getSelection();
      if (!selection.rangeCount) return 0;

      const range = selection.getRangeAt(0);
      const preRange = range.cloneRange();
      preRange.selectNodeContents(element);
      preRange.setEnd(range.endContainer, range.endOffset);

      return [...preRange.toString()].length;
    }

    function setCursorOffset(element, offset) {
      const selection = window.getSelection();
      const range = document.createRange();
      let current = 0;

      function walk(node) {
        if (node.nodeType === Node.TEXT_NODE) {
          const length = [...node.textContent].length;
          if (current + length >= offset) {
            range.setStart(node, Math.min(offset - current, node.textContent.length));
            range.collapse(true);
            selection.removeAllRanges();
            selection.addRange(range);
            return true;
          }
          current += length;
        } else {
          for (let child of node.childNodes) {
            if (walk(child)) return true;
          }
        }
        return false;
      }

      walk(element);
    }

    addBlock();
  </script>

</body>
</html>
